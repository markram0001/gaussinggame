<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>The Gaussing Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <h1>The Gaussing Game</h1>

    <!-- Daily prompt -->
    <div id="prompt">
      <p id="interval-text">Loading today’s puzzle…</p>
    </div>

    <!-- Guess buttons -->
    <div id="guess-box">
      <button id="btn-yes">Yes</button>
      <button id="btn-no">No</button>
    </div>

    <!-- Result after guessing -->
    <div id="result" style="display:none;">
      <p id="correctness"></p>
      <p id="true-value"></p>
    </div>

    <!-- Global stats -->
    <div id="global-stats" style="display:none;">
      <h2>How others guessed</h2>
      <p id="yes-count"></p>
      <p id="no-count"></p>
    </div>

    <!-- Your Stats -->
    <div id="your-stats" style="display:none;">
      <h2>Your Stats</h2>
      <p id="your-yes"></p>
      <p id="your-no"></p>
    </div>

    <script src="script-a.js"></script>
  </body>
</html>
