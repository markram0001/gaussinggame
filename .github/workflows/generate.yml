name: Daily Update

on:
  schedule:
    - cron: "0 5 * * *"   # runs every day at 5:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: markram0001/gaussinggame-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: datarepo

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("readr","dplyr","jsonlite"))'

      - name: Generate today.json
        run: |
          Rscript scripts/generate_json.R

      - name: Add date field to today.json
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          jq --arg day "$TODAY" '.day = $day' data/today.json > data/today_tmp.json
          mv data/today_tmp.json data/today.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git commit -m "Daily update" || echo "No changes to commit"
          git push

      - name: Trigger GitHub Pages rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
