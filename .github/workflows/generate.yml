name: Generate Daily JSON

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:       # lets you run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    

    steps:
      # 1. Check out the PUBLIC repo (gaussinggame)
      - name: Check out public repo
        uses: actions/checkout@v4

      # 2. Check out the PRIVATE repo (gaussinggame-data)
      - name: Check out private data repo
        uses: actions/checkout@v4
        with:
          repository: markram0001/gaussinggame-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: datarepo

      # 3. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 4. Install R packages
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr", "readr", "jsonlite"), repos="https://cloud.r-project.org")'

      # 5. Run your R script
      - name: Run JSON generator
        run: |
          Rscript scripts/generate_json.R

      # 6. Commit and push updated JSON files
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/today.json data/reveal.json
          git commit -m "Daily JSON update" || echo "No changes to commit"
          git push
