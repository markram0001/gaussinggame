name: Daily Update

on:
  schedule:
    - cron: "0 5 * * *"   # runs every day at 5:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout private data repo
        uses: actions/checkout@v4
        with:
          repository: markram0001/gaussinggame-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: datarepo

      - name: Rotate yesterday's puzzle → reveal.json
        run: |
          if [ -f data/today.json ]; then
            cp data/today.json data/reveal.json
          else
            echo "No today.json found — first run?"
          fi

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("readr","dplyr"))'

      - name: Generate new today.json
        run: |
          Rscript scripts/generate_json.R

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json data/reveal.json
          git commit -m "Daily update" || echo "No changes to commit"
          git push
